name: CI

on:
  push:
    branches: [unified, main]
  pull_request:
    branches: [unified, main]

jobs:

  # ── 1. Shell script linting ─────────────────────────────────────────────────
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint shell scripts
        run: |
          shellcheck tools/remote_update/x86_flash_opencm_bin_via_ssh.sh
          shellcheck tools/remote_update/setup_arm_opencm_ssh_flasher.sh
          shellcheck tools/monitor/read_imu.sh
          shellcheck tools/monitor/read_imu_local.sh

  # ── 2. Python syntax ────────────────────────────────────────────────────────
  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check build.py syntax
        run: python3 -m py_compile build.py

      - name: Check Dynamixel tools syntax
        run: |
          for f in tools/dynamixel/*.py; do
            python3 -m py_compile "$f"
          done

  # ── 3. Arduino sketch compilation ───────────────────────────────────────────
  compile-sketches:
    name: Compile all sketches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh \
            | BINDIR=$HOME/bin sh
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Cache arduino data
        uses: actions/cache@v4
        with:
          path: ~/.arduino15
          key: arduino-opencm904-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install OpenCM9.04 board package
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls \
            https://raw.githubusercontent.com/ROBOTIS-GIT/OpenCM9.04/master/arduino/opencm_release/package_opencm9.04_index.json
          arduino-cli core update-index
          arduino-cli core install OpenCM904:OpenCM904

      - name: Install required libraries
        run: |
          arduino-cli lib install "SparkFun BNO080 Cortex Based IMU"
          arduino-cli lib install "Dynamixel2Arduino"

      - name: Compile all sketches
        run: |
          mkdir -p bin
          ln -sf "$(which arduino-cli)" bin/arduino-cli
          python3 build.py --all

  # ── 4. Script smoke tests ───────────────────────────────────────────────────
  smoke-tests:
    name: Script smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scripts are executable
        run: |
          test -x tools/remote_update/x86_flash_opencm_bin_via_ssh.sh
          test -x tools/remote_update/setup_arm_opencm_ssh_flasher.sh
          test -x tools/monitor/read_imu.sh
          test -x tools/monitor/read_imu_local.sh

      - name: Scripts have valid bash syntax
        run: |
          bash -n tools/remote_update/x86_flash_opencm_bin_via_ssh.sh
          bash -n tools/remote_update/setup_arm_opencm_ssh_flasher.sh
          bash -n tools/monitor/read_imu.sh
          bash -n tools/monitor/read_imu_local.sh

      - name: Flash script --help exits cleanly
        run: ./tools/remote_update/x86_flash_opencm_bin_via_ssh.sh --help

      - name: Flash script fails without ARM_HOST
        run: |
          if ARM_HOST="" ./tools/remote_update/x86_flash_opencm_bin_via_ssh.sh 2>/dev/null; then
            echo "Expected non-zero exit but script succeeded" && exit 1
          fi

      - name: Flash script fails with no compiled firmware
        run: |
          if ARM_HOST="user@host" ./tools/remote_update/x86_flash_opencm_bin_via_ssh.sh 2>/dev/null; then
            echo "Expected non-zero exit but script succeeded" && exit 1
          fi

      - name: Monitor script --help exits cleanly
        run: ./tools/monitor/read_imu.sh --help

      - name: Monitor script fails without ARM_HOST
        run: |
          if ARM_HOST="" ./tools/monitor/read_imu.sh 2>/dev/null; then
            echo "Expected non-zero exit but script succeeded" && exit 1
          fi

  # ── NOTE: hardware tests are intentionally excluded from CI ─────────────────
  # Flashing and monitoring require the Jetson Nano (ARM64) to be powered on
  # with the OpenCM9.04 physically connected. These are done manually:
  #
  #   ARM setup:  sudo ./tools/remote_update/setup_arm_opencm_ssh_flasher.sh
  #   Flash:      ./tools/remote_update/x86_flash_opencm_bin_via_ssh.sh
  #   Monitor:    ./tools/monitor/read_imu.sh           (from x86)
  #               ./tools/monitor/read_imu_local.sh     (on Jetson)
